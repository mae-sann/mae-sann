<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0d20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080818;stop-opacity:1" />
    </linearGradient>

    <!-- Electric blue glow gradient -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#1a6fff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#1a6fff;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="glowRight" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#5a20ff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#5a20ff;stop-opacity:0" />
    </radialGradient>

    <!-- Text shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="40%" style="stop-color:#a5c8ff" />
      <stop offset="60%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#818cf8" />
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6fff;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#3d85ff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softblur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="180" cy="100" rx="200" ry="120" fill="url(#glowLeft)"/>
  <ellipse cx="720" cy="100" rx="200" ry="120" fill="url(#glowRight)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#4a80ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Floating particles -->
  <circle cx="80" cy="50" r="2" fill="#3d85ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;44;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="150" r="1.5" fill="#7c3aed" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;144;150" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="1.5" fill="#60a5fa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;24;30" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="170" r="2" fill="#a5c8ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="170;164;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="160" r="1.5" fill="#4a80ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;154;160" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Blue glow behind name -->
  <text x="450" y="105" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="48" font-weight="900" fill="#3d85ff" filter="url(#blur)" opacity="0.5"
        letter-spacing="2">
    Charry Mae Atamosa
  </text>

  <!-- Main name text with shimmer -->
  <text x="450" y="105" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="48" font-weight="900" fill="url(#shimmer)" letter-spacing="2">
    Charry Mae Atamosa
  </text>

  <!-- Decorative accent lines flanking the name -->
  <line x1="60" y1="105" x2="200" y2="105" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="700" y1="105" x2="840" y2="105" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Small diamond decorations -->
  <polygon points="205,105 212,98 219,105 212,112" fill="#3d85ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="681,105 688,98 695,105 688,112" fill="#7c3aed" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="1s" repeatCount="indefinite"/>
  </polygon>

  <!-- Subtitle -->
  <text x="450" y="140" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#94a3b8" letter-spacing="4" font-weight="300">
    UI/UX DESIGNER  ·  FRONTEND DEV  ·  AI ENTHUSIAST
  </text>

  <!-- Bottom accent line -->
  <rect x="320" y="160" width="260" height="1" fill="url(#lineGrad)" opacity="0.7"/>

  <!-- Bottom micro text -->
  <text x="450" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#475569" letter-spacing="2">
    BSIT · CEBU INSTITUTE OF TECHNOLOGY
  </text>

  <!-- Corner decorations -->
  <g opacity="0.4" stroke="#3d85ff" stroke-width="1" fill="none">
    <path d="M 15 15 L 15 30 L 30 30" />
    <path d="M 885 15 L 885 30 L 870 30" />
    <path d="M 15 185 L 15 170 L 30 170" />
    <path d="M 885 185 L 885 170 L 870 170" />
  </g>
</svg>
